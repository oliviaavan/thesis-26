<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOSTALGIA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128247;</text></svg>">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <a href="#upload" class="nav-link active" data-section="upload">Upload</a>
        <a href="#archive" class="nav-link" data-section="archive">Archive</a>
        <a href="#slideshow" class="nav-link" data-section="slideshow">Slideshow</a>
    </nav>

    <!-- Upload Interface (for participants) -->
    <div class="upload-interface" id="uploadInterface">
        <header id="siteHeader">
            <h1>Nostalgia and its making of time, place, and self.</h1>
        </header>

        <main>
            <!-- Upload Section -->
            <section class="upload-section section active" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="upload-text">Drop your memory here</p>
                        <p class="upload-or">or</p>
                        <button class="upload-button" id="uploadButton">Select Memory</button>
                    </div>
                </div>
                <p class="upload-hint">Your memory will be displayed and archived for others to see.</p>
            </section>

            <!-- Archive Section -->
            <section class="gallery-section section" id="archiveSection">
                <div class="gallery" id="gallery"></div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Loading</p>
                </div>
                <p class="empty-message" id="emptyMessage">No memories uploaded yet</p>
            </section>
        </main>
    </div>

    <!-- Projection Slideshow (for the wall) -->
    <div class="slideshow" id="slideshow">
        <div class="slideshow-image" id="slideshowImage"></div>

        <video class="film-texture-overlay" src="assets/filmtexture.mp4" autoplay loop muted playsinline></video>
        <div class="texture-overlay"></div>
        <div class="new-upload-indicator" id="newUploadIndicator">
            <span>New memory added</span>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="script.js"></script>
</body>
</html>
